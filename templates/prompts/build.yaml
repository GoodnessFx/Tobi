name: Build Task Template
version: v1
task_type: fullstack_app
keywords:
  - app
  - application
  - fullstack
  - build
  - scaffold
  - create

sections:
  - name: Overview
    content: |
      Provide a brief overview of the application to be built. Include:
      - Core purpose and user value proposition
      - Target users and use cases
      - Key differentiators from existing solutions

  - name: Architecture
    content: |
      Define the technical architecture:
      - Frontend framework and libraries
      - Backend stack and language
      - Database choice and schema
      - Deployment environment and infrastructure

  - name: Feature List
    content: |
      List all core features with priority:
      - Must-have features (MVP)
      - Nice-to-have features
      - Future enhancements
      Include acceptance criteria for each feature

  - name: API Design
    content: |
      Document RESTful API endpoints:
      - Base URL and versioning strategy
      - Authentication and authorization
      - Request/response formats with examples
      - Error handling and status codes

  - name: Database Schema
    content: |
      Define database entities and relationships:
      - Table/collection definitions
      - Primary and foreign keys
      - Indexes and constraints
      - Migration strategy

  - name: UI Components
    content: |
      List UI components needed:
      - Page layouts and wireframes
      - Reusable component library
      - State management approach
      - Responsive design requirements

  - name: Security Considerations
    content: |
      Address security requirements:
      - Authentication mechanism (OAuth, JWT, etc)
      - Data validation and sanitization
      - Rate limiting and DDoS protection
      - Sensitive data handling and encryption

  - name: Testing Strategy
    content: |
      Define testing approach:
      - Unit test coverage targets (>80%)
      - Integration test scenarios
      - End-to-end test flows
      - Performance and load testing

  - name: Deployment
    content: |
      Document deployment process:
      - Environment setup (dev, staging, production)
      - CI/CD pipeline configuration
      - Rollback procedures
      - Monitoring and logging setup

acceptance_criteria:
  - All core features implemented and functional
  - API fully documented with examples
  - Frontend is responsive across devices
  - Test coverage >= 80% of codebase
  - Deployment is automated and repeatable
  - Security checklist completed
  - Performance meets requirements
  - Documentation is complete and accurate

design_notes:
  - Follow immutability principles in data structures
  - Keep modules under 800 lines
  - Use type hints throughout
  - Maintain high cohesion and low coupling
  - No hardcoded configuration values
