name: Feature Implementation Template
version: v1
task_type: feature
keywords:
  - feature
  - new
  - add
  - implement
  - build
  - create

sections:
  - name: Feature Overview
    content: |
      High-level description of the feature:
      - What problem does it solve
      - Who benefits and how
      - Strategic importance
      - Success definition

  - name: User Story
    content: |
      Standard user story format:
      As a [user type]
      I want to [action/capability]
      So that [benefit/outcome]

  - name: Acceptance Criteria
    content: |
      Clear, testable criteria:
      - [Criteria 1]
      - [Criteria 2]
      - [Criteria 3]
      - [Criteria 4]
      Each criterion should be verifiable

  - name: Technical Design
    content: |
      Implementation design:
      - Technology choices and reasoning
      - Database schema changes if any
      - API endpoints to add or modify
      - Frontend components needed
      - Performance considerations

  - name: Data Model
    content: |
      Define data structures:
      - New entities or tables
      - Field definitions and types
      - Relationships and constraints
      - Migration strategy for existing data

  - name: API Specification
    content: |
      Document all API changes:
      - New endpoints (method, path, parameters)
      - Request and response formats
      - Authentication and authorization
      - Rate limiting if applicable
      - Versioning strategy

  - name: UI/UX Design
    content: |
      Design the user interface:
      - Wireframes or mockups
      - Component breakdown
      - User flows and interactions
      - Responsive design approach
      - Accessibility requirements

  - name: Testing Plan
    content: |
      Comprehensive test coverage:
      - Unit tests for business logic
      - Integration tests for API
      - End-to-end tests for user flows
      - Edge cases and error scenarios
      - Performance benchmarks

  - name: Rollout Strategy
    content: |
      Plan feature rollout:
      - Phased rollout approach
      - Feature flags or gradual deployment
      - Monitoring metrics
      - Rollback procedure
      - Communication plan

acceptance_criteria:
  - All acceptance criteria met
  - Code coverage >= 80%
  - API fully documented
  - UI is responsive and accessible
  - Performance requirements met
  - No breaking changes to existing APIs
  - Documentation is complete
  - Code review approved

design_notes:
  - Keep features modular and independent
  - Design for extensibility
  - Consider backward compatibility
  - Add comprehensive logging
  - Include error handling
  - Document edge cases
  - Plan for monitoring and debugging
