name: Bug Fix Template
version: v1
task_type: bug_fix
keywords:
  - bug
  - fix
  - error
  - issue
  - broken
  - crash

sections:
  - name: Bug Description
    content: |
      Clearly describe the bug:
      - What is broken
      - When it occurs
      - Impact on users
      - Reproducibility (always, sometimes, rarely)

  - name: Expected vs Actual Behavior
    content: |
      Define the behavior contract:
      - Expected behavior (how it should work)
      - Actual behavior (what happens instead)
      - Any error messages or logs
      - Visual screenshots if applicable

  - name: Reproduction Steps
    content: |
      Provide clear, numbered steps:
      1. Step to perform
      2. Next step
      3. Action that triggers bug
      Include any preconditions needed

  - name: Environment Details
    content: |
      Specify the environment:
      - Application version
      - Operating system
      - Browser or runtime
      - Relevant dependencies and versions
      - Database/API backend being used

  - name: Root Cause Analysis
    content: |
      Explain what is causing the issue:
      - Code location or component affected
      - Why the code is behaving this way
      - Conditions that trigger the bug
      - Related code or recent changes

  - name: Fix Strategy
    content: |
      Outline how to fix it:
      - Proposed solution
      - Alternative approaches considered
      - Potential side effects
      - Performance implications

  - name: Testing Approach
    content: |
      Define verification tests:
      - Unit test for the specific bug
      - Integration tests affected
      - Regression test cases
      - Manual testing steps

  - name: Verification Checklist
    content: |
      Steps to verify the fix:
      - Bug no longer reproduces
      - Related functionality still works
      - No new errors in logs
      - Performance is acceptable
      - Code review approved

acceptance_criteria:
  - Bug is reproducible from provided steps
  - Root cause is clearly identified
  - Fix does not introduce new regressions
  - Unit test exists for bug case
  - Error handling is robust
  - Code is reviewed and approved
  - All tests pass

design_notes:
  - Avoid temporary fixes or hacks
  - Add defensive programming patterns
  - Log appropriate debug information
  - Consider edge cases and boundary conditions
  - Update error messages if applicable
