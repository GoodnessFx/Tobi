name: Refactoring Template
version: v1
task_type: refactor
keywords:
  - refactor
  - improve
  - clean
  - simplify
  - optimize

sections:
  - name: Refactoring Scope
    content: |
      Define what is being refactored:
      - Target module or component
      - Current state assessment
      - Pain points and issues
      - Scope boundaries

  - name: Current Problems
    content: |
      Identify issues to address:
      - Code complexity metrics
      - Code duplication and violations (DRY)
      - Performance bottlenecks
      - Technical debt items
      - Maintainability concerns

  - name: Refactoring Goals
    content: |
      Clear, measurable goals:
      - Reduce complexity by X%
      - Eliminate Y% code duplication
      - Improve performance by Z%
      - Improve readability and maintainability
      - Reduce lines of code by X%

  - name: Implementation Strategy
    content: |
      Step-by-step refactoring plan:
      - Phases and dependencies
      - Order of changes (bottom-up, top-down, etc)
      - Interruptible checkpoints
      - Testing at each phase
      - Risk mitigation

  - name: Affected Code Areas
    content: |
      List all areas that will change:
      - Files to modify
      - Modules or packages affected
      - API changes (if any)
      - Breaking changes (if any)
      - Dependencies that change

  - name: Testing Requirements
    content: |
      Ensure correctness:
      - Regression test suite
      - Performance baseline and testing
      - Load testing if applicable
      - Edge case coverage
      - Before/after behavior comparison

  - name: Performance Impact
    content: |
      Document performance changes:
      - Expected performance improvements
      - Memory usage changes
      - CPU usage changes
      - Latency improvements
      - Throughput changes

  - name: Documentation Updates
    content: |
      Update all relevant docs:
      - Architecture documentation
      - API documentation if changed
      - Code comments and docstrings
      - Configuration documentation
      - Deployment notes

acceptance_criteria:
  - All tests pass
  - No performance degradation (or improvement as intended)
  - Code duplication reduced by target %
  - Complexity metrics improved
  - Documentation updated
  - Behavior unchanged (unless intentional)
  - Code review approved

design_notes:
  - Refactor incrementally
  - Keep commits small and focused
  - Run tests after each step
  - Document why changes are made
  - Consider future maintainability
  - Use established patterns
  - Profile before and after
