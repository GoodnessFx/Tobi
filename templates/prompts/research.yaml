name: Research Template
version: v1
task_type: research
keywords:
  - research
  - investigate
  - explore
  - learn
  - understand

sections:
  - name: Research Topic
    content: |
      Define the research subject:
      - Main topic or problem statement
      - Context and background
      - Why this research matters
      - Intended audience for findings

  - name: Research Questions
    content: |
      Core questions to answer:
      1. Primary research question
      2. Secondary questions to explore
      3. Related aspects to investigate
      4. Edge cases or boundary conditions

  - name: Research Scope
    content: |
      Establish boundaries:
      - Time period or timeframe
      - Geographic or domain limitations
      - Included vs excluded topics
      - Scale and depth of research

  - name: Methodology
    content: |
      Research approach and methods:
      - Literature review
      - Competitor analysis
      - Expert interviews
      - Data analysis
      - Case studies
      - Surveys or questionnaires

  - name: Information Sources
    content: |
      Where to find information:
      - Academic papers and publications
      - Industry reports and whitepapers
      - Expert sources and thought leaders
      - Company documentation
      - Market data providers
      - Forums and communities

  - name: Research Timeline
    content: |
      Schedule for research:
      - Phase 1: Initial research and discovery
      - Phase 2: Deep dive and analysis
      - Phase 3: Synthesis and conclusion
      - Review and validation period
      - Final report preparation

  - name: Expected Findings
    content: |
      Anticipated deliverables:
      - Executive summary (500 words)
      - Detailed findings and analysis
      - Competitive landscape (if applicable)
      - Key insights and patterns
      - Recommendations or conclusions
      - Referenced sources and citations

  - name: Validation Approach
    content: |
      Ensure research quality:
      - Source credibility assessment
      - Data accuracy verification
      - Peer review or expert validation
      - Cross-reference checking
      - Bias identification and mitigation

acceptance_criteria:
  - Research questions answered
  - Findings based on credible sources
  - Data is cited and traceable
  - Recommendations are actionable
  - Summary is clear and concise
  - Sources are properly documented
  - No conflicts of interest

design_notes:
  - Use recent and authoritative sources
  - Distinguish between opinion and fact
  - Consider multiple perspectives
  - Document assumptions made
  - Keep notes organized during research
  - Verify surprising findings
  - Maintain objectivity throughout
